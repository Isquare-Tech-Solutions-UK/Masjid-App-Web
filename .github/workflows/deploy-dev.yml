name: Deploy Frontend to Dev

on:
  push:
    branches:
      - dev
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Deployment

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.dev
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/masjid-app-frontend:dev-latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: Deployment

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create frontend directory on Hostinger VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEV_EC2_HOST }}
          username: ${{ secrets.DEV_EC2_USERNAME }}
          key: ${{ secrets.DEV_EC2_SSH_KEY }}
          script: |
            mkdir -p ~/masjid-frontend

      - name: Copy docker-compose to Hostinger VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DEV_EC2_HOST }}
          username: ${{ secrets.DEV_EC2_USERNAME }}
          key: ${{ secrets.DEV_EC2_SSH_KEY }}
          source: "./docker-compose.dev.yml"
          target: "~/masjid-frontend"

      - name: Deploy Frontend
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEV_EC2_HOST }}
          username: ${{ secrets.DEV_EC2_USERNAME }}
          key: ${{ secrets.DEV_EC2_SSH_KEY }}
          script: |
            cd ~/masjid-frontend

            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}

            docker compose -f docker-compose.dev.yml pull

            docker compose -f docker-compose.dev.yml up -d --force-recreate --remove-orphans

            docker image prune -f
